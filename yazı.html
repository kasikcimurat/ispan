<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İspanyolca Yazı Çalışması</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e17;
  --card: #1a1828;
  --card2: #221f35;
  --accent: #ff6b6b;
  --accent2: #ffd166;
  --accent3: #06d6a0;
  --text: #fffffe;
  --muted: #a7a9be;
  --correct: #06d6a0;
  --wrong: #ff6b6b;
  --border: rgba(255,255,255,0.07);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Quicksand', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content:'';
  position:fixed;
  top:-30%;left:-20%;
  width:60vw;height:60vw;
  background: radial-gradient(circle, rgba(255,107,107,0.12) 0%, transparent 70%);
  pointer-events:none;
}
body::after {
  content:'';
  position:fixed;
  bottom:-20%;right:-10%;
  width:50vw;height:50vw;
  background: radial-gradient(circle, rgba(6,214,160,0.1) 0%, transparent 70%);
  pointer-events:none;
}

.header {
  text-align:center;
  margin-bottom: 32px;
}

.header h1 {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(22px, 5vw, 36px);
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
}

.header h1 span { color: var(--accent); }

.header p {
  color: var(--muted);
  font-size: 13px;
  margin-top: 6px;
}

.stats {
  display: flex;
  gap: 16px;
  margin-bottom: 28px;
}

.stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 20px;
  text-align: center;
}

.stat-num {
  font-family: 'Nunito', sans-serif;
  font-size: 22px;
  font-weight: 700;
}

.stat-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stat:nth-child(1) .stat-num { color: var(--correct); }
.stat:nth-child(2) .stat-num { color: var(--wrong); }
.stat:nth-child(3) .stat-num { color: var(--accent2); }

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px 32px;
  max-width: 560px;
  width: 100%;
}

.question-box {
  background: linear-gradient(135deg, var(--card2) 0%, rgba(255,107,107,0.08) 100%);
  border: 1px solid rgba(255,107,107,0.2);
  border-radius: 18px;
  padding: 32px 24px;
  text-align: center;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}

.question-box::before {
  content:'✏️';
  position:absolute;
  right:10px; top:10px;
  font-size:60px;
  opacity:0.08;
  pointer-events:none;
}

.question-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 12px;
}

.question-word {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(30px, 7vw, 50px);
  font-weight: 800;
  color: var(--text);
  line-height: 1.1;
}

.input-wrap {
  position: relative;
  margin-bottom: 16px;
}

input[type="text"] {
  width: 100%;
  padding: 16px 20px;
  font-size: 17px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 500;
  background: var(--card2);
  border: 2px solid var(--border);
  border-radius: 14px;
  color: var(--text);
  outline: none;
  transition: all 0.18s ease;
}

input[type="text"]::placeholder { color: var(--muted); }

input[type="text"]:focus {
  border-color: rgba(255,107,107,0.5);
  box-shadow: 0 0 0 3px rgba(255,107,107,0.08);
}

input[type="text"].input-correct {
  border-color: var(--correct);
  box-shadow: 0 0 0 3px rgba(6,214,160,0.1);
}

input[type="text"].input-wrong {
  border-color: var(--wrong);
  box-shadow: 0 0 0 3px rgba(255,107,107,0.1);
}

.button-group {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 14px;
  font-family: 'Quicksand', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn-primary {
  background: linear-gradient(135deg, rgba(255,107,107,0.8), rgba(255,107,107,0.6));
  color: white;
  border: 2px solid rgba(255,107,107,0.4);
}

.btn-primary:hover {
  background: linear-gradient(135deg, rgba(255,107,107,1), rgba(255,107,107,0.8));
  transform: translateY(-2px);
}

.btn-secondary {
  background: transparent;
  border: 2px solid var(--border);
  color: var(--muted);
}

.btn-secondary:hover {
  border-color: rgba(255,255,255,0.2);
  color: var(--text);
  background: rgba(255,255,255,0.04);
  transform: translateY(-2px);
}

.btn-show {
  background: linear-gradient(135deg, rgba(255,209,102,0.15), rgba(255,209,102,0.05));
  border: 2px solid rgba(255,209,102,0.3);
  color: var(--accent2);
}

.btn-show:hover {
  background: rgba(255,209,102,0.2);
  transform: translateY(-2px);
}

.btn-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 12px;
  padding: 13px;
  background: linear-gradient(135deg, rgba(6,214,160,0.12), rgba(6,214,160,0.05));
  border: 2px solid rgba(6,214,160,0.3);
  border-radius: 14px;
  color: var(--accent3);
  font-family: 'Quicksand', sans-serif;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.18s ease;
  cursor: pointer;
  width: 100%;
}

.btn-nav:hover {
  background: rgba(6,214,160,0.2);
  transform: translateY(-2px);
}

#sonuc {
  margin-top: 16px;
  font-weight: 600;
  font-size: 18px;
  min-height: 36px;
  padding: 12px 16px;
  border-radius: 12px;
  text-align: center;
  transition: all 0.2s ease;
}

.dogru {
  color: var(--correct);
  background: rgba(6,214,160,0.1);
  border: 1px solid rgba(6,214,160,0.2);
}

.yanlis {
  color: var(--wrong);
  background: rgba(255,107,107,0.1);
  border: 1px solid rgba(255,107,107,0.2);
}

.goster {
  color: var(--accent2);
  background: rgba(255,209,102,0.08);
  border: 1px solid rgba(255,209,102,0.2);
}

@media (max-width:480px) {
  .card { padding: 24px 18px; }
  .stats { gap: 10px; }
  .stat { padding: 8px 14px; }
  .button-group { flex-wrap: wrap; }
}
</style>
</head>
<body>

<div class="header">
  <h1>✏️ Yazı <span>Çalışması</span></h1>
  <p>Kelimeyi yazarak öğren</p>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-num" id="dogruSay">0</div>
    <div class="stat-label">Doğru</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="yanlisSay">0</div>
    <div class="stat-label">Yanlış</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="toplamSay">0</div>
    <div class="stat-label">Toplam</div>
  </div>
</div>

<div class="card">
  <div class="question-box">
    <div class="question-label">Bu kelimenin Türkçesi nedir?</div>
    <div class="question-word" id="kelime">...</div>
  </div>

  <div class="input-wrap">
    <input type="text" id="cevap" placeholder="Türkçesini yaz..." autocomplete="off" autocorrect="off" spellcheck="false">
  </div>

  <div class="button-group">
    <button class="btn btn-primary" onclick="kontrolEt()">✓ Kontrol Et</button>
    <button class="btn btn-secondary" onclick="gec()">⏭ Geç</button>
    <button class="btn btn-show" onclick="cevabiGoster()">👁 Göster</button>
  </div>

  <div id="sonuc"></div>

  <a href="şıklı.html" class="btn-nav">🎯 Şıklı Teste Git</a>
    <a href="cümleşık.html" class="btn-nav">🎯 Cümlelere Git</a>

</div>

<script src="kelimeler.js"></script>
<script>

let aktifKelime;
let dogru = 0, yanlis = 0, toplam = 0;

function yeniKelime() {
  const sonucDiv = document.getElementById("sonuc");
  const input = document.getElementById("cevap");
  sonucDiv.innerText = "";
  sonucDiv.className = '';
  input.value = "";
  input.className = '';
  aktifKelime = kelimeler[Math.floor(Math.random() * kelimeler.length)];
  document.getElementById("kelime").innerText = aktifKelime.isp;
  input.focus();
}

function cevabiGoster() {
  const sonucDiv = document.getElementById("sonuc");
  sonucDiv.innerText = "✦ Doğru cevap: " + aktifKelime.tr;
  sonucDiv.className = 'goster';
}

function kontrolEt() {
  let girilen = document.getElementById("cevap").value.trim().toLowerCase();
  const sonucDiv = document.getElementById("sonuc");
  const input = document.getElementById("cevap");

  if (girilen === "pas") {
    sonucDiv.innerText = "✦ Doğru cevap: " + aktifKelime.tr;
    sonucDiv.className = 'goster';
    setTimeout(yeniKelime, 1500);
    return;
  }

  toplam++;
  document.getElementById('toplamSay').textContent = toplam;

  if (girilen === aktifKelime.tr) {
    dogru++;
    document.getElementById('dogruSay').textContent = dogru;
    sonucDiv.innerText = "Doğru ✅";
    sonucDiv.className = 'dogru';
    input.className = 'input-correct';
    setTimeout(yeniKelime, 1500);
  } else {
    yanlis++;
    document.getElementById('yanlisSay').textContent = yanlis;
    sonucDiv.innerText = "Yanlış ❌ — Tekrar dene";
    sonucDiv.className = 'yanlis';
    input.className = 'input-wrong';
    setTimeout(() => { input.className = ''; }, 600);
  }
}

function gec() { yeniKelime(); }

document.getElementById("cevap").addEventListener("keypress", function(e) {
  if (e.key === "Enter") kontrolEt();
});

yeniKelime();
</script>

</body>
</html>
