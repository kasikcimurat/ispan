<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İspanyolca Kelime Testi</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e17;
  --card: #1a1828;
  --card2: #221f35;
  --accent: #ff6b6b;
  --accent2: #ffd166;
  --accent3: #06d6a0;
  --accent4: #118ab2;
  --text: #fffffe;
  --muted: #a7a9be;
  --correct: #06d6a0;
  --wrong: #ff6b6b;
  --border: rgba(255,255,255,0.07);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Quicksand', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content:'';
  position:fixed;
  top:-30%;left:-20%;
  width:60vw;height:60vw;
  background: radial-gradient(circle, rgba(255,107,107,0.12) 0%, transparent 70%);
  pointer-events:none;
}
body::after {
  content:'';
  position:fixed;
  bottom:-20%;right:-10%;
  width:50vw;height:50vw;
  background: radial-gradient(circle, rgba(6,214,160,0.1) 0%, transparent 70%);
  pointer-events:none;
}

.header {
  text-align:center;
  margin-bottom: 32px;
}

.header h1 {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(22px, 5vw, 36px);
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
}

.header h1 span { color: var(--accent); }

.header p {
  color: var(--muted);
  font-size: 13px;
  margin-top: 6px;
}

.stats {
  display: flex;
  gap: 16px;
  margin-bottom: 28px;
}

.stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 20px;
  text-align: center;
}

.stat-num {
  font-family: 'Nunito', sans-serif;
  font-size: 22px;
  font-weight: 700;
}

.stat-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stat:nth-child(1) .stat-num { color: var(--correct); }
.stat:nth-child(2) .stat-num { color: var(--wrong); }
.stat:nth-child(3) .stat-num { color: var(--accent2); }

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px 32px;
  max-width: 560px;
  width: 100%;
  position: relative;
}

.direction-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 20px;
  font-weight: 500;
}

.direction-badge .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent2);
}

.question-box {
  background: linear-gradient(135deg, var(--card2) 0%, rgba(255,107,107,0.08) 100%);
  border: 1px solid rgba(255,107,107,0.2);
  border-radius: 18px;
  padding: 32px 24px;
  text-align: center;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
}

.question-box::before {
  content:'?';
  position:absolute;
  right:-10px; top:-20px;
  font-size:120px;
  font-family:'Syne',sans-serif;
  font-weight:800;
  color:rgba(255,107,107,0.06);
  line-height:1;
  pointer-events:none;
}

.question-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 12px;
}

.question-word {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(30px, 7vw, 50px);
  font-weight: 800;
  color: var(--text);
  line-height: 1.1;
}

.question-hint {
  font-size: 12px;
  color: var(--muted);
  margin-top: 10px;
}

.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 18px;
}

.option-btn {
  background: var(--card2);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 16px 12px;
  color: var(--text);
  font-family: 'Quicksand', sans-serif;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.18s ease;
  text-align: center;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  gap: 10px;
}

.option-btn .opt-letter {
  width: 26px; height: 26px;
  border-radius: 7px;
  background: rgba(255,255,255,0.07);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  flex-shrink: 0;
  font-family: 'Nunito', sans-serif;
}

.option-btn .opt-text {
  flex: 1;
  text-align: left;
  line-height: 1.3;
}

.option-btn:hover:not(:disabled) {
  border-color: rgba(255,107,107,0.5);
  background: rgba(255,107,107,0.08);
  transform: translateY(-2px);
}

.option-btn.correct {
  border-color: var(--correct);
  background: rgba(6,214,160,0.12);
}

.option-btn.correct .opt-letter {
  background: var(--correct);
  color: #0f0e17;
}

.option-btn.wrong {
  border-color: var(--wrong);
  background: rgba(255,107,107,0.12);
}

.option-btn.wrong .opt-letter {
  background: var(--wrong);
  color: #0f0e17;
}

.option-btn:disabled {
  cursor: default;
}

.bottom-row {
  display: flex;
  gap: 10px;
}

.pass-btn {
  flex: 1;
  padding: 14px;
  background: transparent;
  border: 2px solid var(--border);
  border-radius: 14px;
  color: var(--muted);
  font-family: 'Quicksand', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.pass-btn:hover {
  border-color: rgba(255,255,255,0.2);
  color: var(--text);
  background: rgba(255,255,255,0.04);
}

.toggle-btn {
  flex: 1;
  padding: 14px;
  background: linear-gradient(135deg, rgba(255,209,102,0.15), rgba(255,209,102,0.05));
  border: 2px solid rgba(255,209,102,0.3);
  border-radius: 14px;
  color: var(--accent2);
  font-family: 'Quicksand', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.toggle-btn:hover {
  background: rgba(255,209,102,0.2);
}

.yazi-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 12px;
  padding: 13px;
  background: linear-gradient(135deg, rgba(6,214,160,0.12), rgba(6,214,160,0.05));
  border: 2px solid rgba(6,214,160,0.3);
  border-radius: 14px;
  color: var(--accent3);
  font-family: 'Quicksand', sans-serif;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.18s ease;
}

.yazi-btn:hover {
  background: rgba(6,214,160,0.2);
  transform: translateY(-2px);
}

.feedback {
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  font-family:'Syne',sans-serif;
  font-size:80px;
  opacity:0;
  pointer-events:none;
  transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  z-index:100;
}

.feedback.show {
  transform:translate(-50%,-50%) scale(1);
  opacity:1;
}

.feedback.hide {
  transform:translate(-50%,-50%) scale(1.5);
  opacity:0;
  transition: all 0.3s ease;
}

@media (max-width:480px) {
  .options { grid-template-columns: 1fr; }
  .card { padding: 24px 18px; }
  .stats { gap: 10px; }
  .stat { padding: 8px 14px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🇪🇸 İspan<span>yolca</span></h1>
  <p>4 şıklı kelime testi — her iki yönde</p>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-num" id="dogruSay">0</div>
    <div class="stat-label">Doğru</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="yanlisSay">0</div>
    <div class="stat-label">Yanlış</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="toplamSay">0</div>
    <div class="stat-label">Toplam</div>
  </div>
</div>

<div class="card">
  <div class="direction-badge">
    <div class="dot"></div>
    <span id="directionText">İspanyolca → Türkçe</span>
  </div>

  <div class="question-box">
    <div class="question-label" id="questionLabel">Bu kelimenin Türkçesi nedir?</div>
    <div class="question-word" id="questionWord">...</div>
    <div class="question-hint" id="questionHint"></div>
  </div>

  <div class="options" id="optionsContainer"></div>

  <div class="bottom-row">
    <button class="pass-btn" onclick="pas()">⏭ Geç</button>
    <button class="toggle-btn" onclick="toggleDirection()">🔄 Yön Değiştir</button>
  </div>

  <a href="yazı.html" class="yazi-btn">✏️ Yazı Çalışmasına Git</a>
    <a href="cümleşık.html" class="yazi-btn">✏️ Cümle Çalışmasına Git</a>

  
</div>

<div class="feedback" id="feedbackEmoji"></div>

<script src="kelimeler.js"></script>
<script>

let direction = 'isp_to_tr'; // 'isp_to_tr' veya 'tr_to_isp'
let aktifKelime = null;
let dogru = 0, yanlis = 0, toplam = 0;
let answered = false;

function getRandom(arr, count, exclude) {
  const pool = arr.filter(k => k !== exclude);
  const result = [];
  const used = new Set();
  while (result.length < count && result.length < pool.length) {
    const i = Math.floor(Math.random() * pool.length);
    if (!used.has(i)) { used.add(i); result.push(pool[i]); }
  }
  return result;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function yeniSoru() {
  answered = false;
  aktifKelime = kelimeler[Math.floor(Math.random() * kelimeler.length)];

  const isItoT = direction === 'isp_to_tr';
  document.getElementById('directionText').textContent = isItoT ? 'İspanyolca → Türkçe' : 'Türkçe → İspanyolca';
  document.getElementById('questionLabel').textContent = isItoT ? 'Bu kelimenin Türkçesi nedir?' : 'Bu kelimenin İspanyolcası nedir?';
  document.getElementById('questionWord').textContent = isItoT ? aktifKelime.isp : aktifKelime.tr;
  document.getElementById('questionHint').textContent = '';

  // 3 yanlış şık + 1 doğru
  const yanlislar = getRandom(kelimeler, 3, aktifKelime);
  const secenekler = shuffle([aktifKelime, ...yanlislar]);

  const letters = ['A','B','C','D'];
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';

  secenekler.forEach((k, i) => {
    const text = isItoT ? k.tr : k.isp;
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span class="opt-text">${text}</span>`;
    btn.onclick = () => secim(btn, k === aktifKelime, isItoT);
    container.appendChild(btn);
  });
}

function secim(btn, isCorrect, isItoT) {
  if (answered) return;
  answered = true;
  toplam++;
  document.getElementById('toplamSay').textContent = toplam;

  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);

  if (isCorrect) {
    dogru++;
    document.getElementById('dogruSay').textContent = dogru;
    btn.classList.add('correct');
    showFeedback('✅');
  } else {
    yanlis++;
    document.getElementById('yanlisSay').textContent = yanlis;
    btn.classList.add('wrong');
    showFeedback('❌');
    // doğru cevabı göster
    allBtns.forEach(b => {
      const txt = b.querySelector('.opt-text').textContent;
      const dogruTxt = isItoT ? aktifKelime.tr : aktifKelime.isp;
      if (txt === dogruTxt) b.classList.add('correct');
    });
    document.getElementById('questionHint').textContent = '✦ ' + (isItoT ? aktifKelime.tr : aktifKelime.isp);
  }

  setTimeout(yeniSoru, 1800);
}

function showFeedback(emoji) {
  const el = document.getElementById('feedbackEmoji');
  el.textContent = emoji;
  el.className = 'feedback show';
  setTimeout(() => {
    el.className = 'feedback hide';
    setTimeout(() => el.className = 'feedback', 300);
  }, 700);
}

function pas() {
  if (!answered) yeniSoru();
}

function toggleDirection() {
  direction = direction === 'isp_to_tr' ? 'tr_to_isp' : 'isp_to_tr';
  yeniSoru();
}

yeniSoru();
</script>
</body>
</html>
