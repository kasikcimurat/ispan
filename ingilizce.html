<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>İngilizce Quiz</title>
  <link rel="icon" type="png" href="logo.png">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06091a;
  --card: #0c1128;
  --card2: #111a3a;
  --yellow: #f7c500;
  --yellow-soft: #ffd84d;
  --navy: #0a1535;
  --navy2: #152050;
  --text: #f0f4ff;
  --muted: #5a6e9e;
  --correct: #3de8a0;
  --wrong: #ff4f6e;
  --border: rgba(247,197,0,0.12);
  --border-strong: rgba(247,197,0,0.35);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 40px;
  position: relative;
  overflow-x: hidden;
}

/* ── Background ── */
.bg-grid {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(247,197,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(247,197,0,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

.blob {
  position: fixed; border-radius: 50%;
  filter: blur(90px); pointer-events: none;
  animation: drift 14s ease-in-out infinite alternate;
}
.blob1 { width:460px;height:460px;background:#0a1f80;top:-180px;left:-140px;opacity:0.22;animation-delay:0s; }
.blob2 { width:380px;height:380px;background:#061040;bottom:-160px;right:-100px;opacity:0.3;animation-delay:5s; }
.blob3 { width:260px;height:260px;background:#f7c500;top:38%;left:55%;opacity:0.045;animation-delay:9s; }

@keyframes drift {
  0%   { transform: translate(0,0) scale(1); }
  100% { transform: translate(25px,18px) scale(1.07); }
}

/* ── Logo / Header ── */
.header {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 22px;
  margin-top: 8px;
  position: relative; z-index:1;
}

.logo-ring {
  width: 68px; height: 68px;
  border-radius: 50%;
  background: linear-gradient(145deg, #f7c500, #e6a800);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 12px;
  box-shadow: 0 0 32px rgba(247,197,0,0.35), 0 4px 20px rgba(0,0,0,0.5);
  position: relative;
}

.logo-ring::after {
  content:'';
  position:absolute; inset:4px;
  border-radius:50%;
  background: var(--bg);
}

.logo-inner {
  position:relative; z-index:1;
  font-family:'Barlow Condensed',sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: var(--yellow);
  letter-spacing: 0;
  text-shadow: 0 0 10px rgba(247,197,0,0.5);
}

.header h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(26px, 6vw, 40px);
  font-weight: 800;
  color: var(--text);
  letter-spacing: 0.5px;
  line-height: 1;
  text-align: center;
}

.header h1 span {
  color: var(--yellow);
  text-shadow: 0 0 20px rgba(247,197,0,0.4);
}

.header p {
  color: var(--muted);
  font-size: 13px;
  margin-top: 6px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

/* ── Level Buttons ── */
.level-selector {
  display: flex; gap: 10px;
  margin-bottom: 20px;
  position: relative; z-index:1;
  width: 100%; max-width: 560px;
  flex-wrap: wrap;
}

.level-btn {
  flex: 1;
  padding: 12px 16px;
  border-radius: 14px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s ease;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.level-btn.a {
  background: rgba(247,197,0,0.08);
  border-color: rgba(247,197,0,0.25);
  color: rgba(247,197,0,0.7);
}
.level-btn.a.active, .level-btn.a:hover {
  background: rgba(247,197,0,0.18);
  border-color: var(--yellow);
  color: var(--yellow);
  box-shadow: 0 0 18px rgba(247,197,0,0.25), inset 0 1px 0 rgba(247,197,0,0.15);
}

.level-btn.b1 {
  background: rgba(21, 60, 180, 0.12);
  border-color: rgba(50,100,255,0.2);
  color: rgba(120,160,255,0.7);
}
.level-btn.b1.active, .level-btn.b1:hover {
  background: rgba(21, 60, 180, 0.22);
  border-color: #4a7dff;
  color: #7aaeff;
  box-shadow: 0 0 18px rgba(30,80,255,0.2);
}

.level-btn.fiil {
  background: rgba(100, 20, 180, 0.12);
  border-color: rgba(160,60,255,0.2);
  color: rgba(200,130,255,0.7);
}
.level-btn.fiil.active, .level-btn.fiil:hover {
  background: rgba(100, 20, 180, 0.22);
  border-color: #b060ff;
  color: #cc90ff;
  box-shadow: 0 0 18px rgba(140,40,255,0.2);
}

.lvl-badge.fiil {
  background: rgba(140,40,255,0.12);
  border: 1px solid rgba(180,90,255,0.4);
  color: #cc90ff;
}

.question-box.level-fiil {
  background: linear-gradient(145deg, var(--card2), rgba(140,40,255,0.06));
  border-color: rgba(180,90,255,0.35);
}
.question-box.level-fiil::after { content: 'V2'; }

/* Tarih */
.level-btn.tarih {
  background: rgba(20,160,100,0.1);
  border-color: rgba(40,210,120,0.2);
  color: rgba(80,220,150,0.7);
}
.level-btn.tarih.active, .level-btn.tarih:hover {
  background: rgba(20,160,100,0.2);
  border-color: #28d478;
  color: #5debb0;
  box-shadow: 0 0 18px rgba(20,200,100,0.2);
}
.lvl-badge.tarih {
  background: rgba(20,180,100,0.12);
  border: 1px solid rgba(40,210,120,0.4);
  color: #5debb0;
}
.question-box.level-tarih {
  background: linear-gradient(145deg, var(--card2), rgba(20,180,100,0.06));
  border-color: rgba(40,210,120,0.35);
}
.question-box.level-tarih::after { content: 'DATE'; }

/* Saat */
.level-btn.saat {
  background: rgba(220,120,20,0.1);
  border-color: rgba(255,160,40,0.2);
  color: rgba(255,180,80,0.7);
}
.level-btn.saat.active, .level-btn.saat:hover {
  background: rgba(220,120,20,0.2);
  border-color: #ffa028;
  color: #ffc060;
  box-shadow: 0 0 18px rgba(220,140,20,0.2);
}
.lvl-badge.saat {
  background: rgba(220,140,20,0.12);
  border: 1px solid rgba(255,170,40,0.4);
  color: #ffc060;
}
.question-box.level-saat {
  background: linear-gradient(145deg, var(--card2), rgba(220,140,20,0.06));
  border-color: rgba(255,160,40,0.35);
}
.question-box.level-saat::after { content: 'TIME'; }

/* Sayı */
.level-btn.sayi {
  background: rgba(20,160,220,0.1);
  border-color: rgba(40,200,255,0.2);
  color: rgba(80,210,255,0.7);
}
.level-btn.sayi.active, .level-btn.sayi:hover {
  background: rgba(20,160,220,0.2);
  border-color: #28c8ff;
  color: #60d8ff;
  box-shadow: 0 0 18px rgba(20,180,255,0.2);
}
.lvl-badge.sayi {
  background: rgba(20,180,220,0.12);
  border: 1px solid rgba(40,210,255,0.4);
  color: #60d8ff;
}
.question-box.level-sayi {
  background: linear-gradient(145deg, var(--card2), rgba(20,180,220,0.06));
  border-color: rgba(40,200,255,0.35);
}
.question-box.level-sayi::after { content: '123'; }

/* ── Stats ── */
.stats {
  display: flex; gap: 10px;
  margin-bottom: 18px;
  position: relative; z-index:1;
  width: 100%; max-width: 560px;
}

.stat {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 12px 8px;
  text-align: center;
}

.stat-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px;
  font-weight: 800;
  line-height: 1;
}
.stat-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-top: 3px;
  font-weight: 700;
}

.stat:nth-child(1) .stat-num { color: var(--correct); }
.stat:nth-child(2) .stat-num { color: var(--wrong); }
.stat:nth-child(3) .stat-num { color: var(--yellow); }

/* ── Main Card ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 26px;
  padding: 28px 22px 22px;
  max-width: 560px;
  width: 100%;
  position: relative; z-index:1;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 1px 0 rgba(247,197,0,0.08) inset;
}

/* yellow top stripe */
.card::before {
  content:'';
  position:absolute;
  top:0; left:24px; right:24px;
  height:3px;
  background: linear-gradient(90deg, transparent, var(--yellow), transparent);
  border-radius:0 0 4px 4px;
}

/* ── Badge row ── */
.badge-row {
  display:flex; align-items:center; gap:8px;
  margin-bottom:18px; flex-wrap:wrap;
}

.dir-badge {
  display:inline-flex; align-items:center; gap:7px;
  background: var(--card2);
  border:1px solid var(--border);
  border-radius:20px;
  padding:6px 14px;
  font-size:12px; color:var(--muted);
  font-weight:700; letter-spacing:0.3px;
}
.dir-badge .dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--yellow);
  box-shadow:0 0 6px var(--yellow);
}

.lvl-badge {
  display:inline-flex; align-items:center;
  border-radius:20px; padding:6px 14px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px; font-weight:700;
  letter-spacing:0.5px; text-transform:uppercase;
}
.lvl-badge.a {
  background:rgba(247,197,0,0.12);
  border:1px solid rgba(247,197,0,0.4);
  color:var(--yellow);
}
.lvl-badge.b1 {
  background:rgba(30,80,255,0.12);
  border:1px solid rgba(74,125,255,0.4);
  color:#7aaeff;
}

/* ── Question Box ── */
.question-box {
  border-radius: 18px;
  padding: 26px 20px;
  text-align: center;
  margin-bottom: 18px;
  min-height: 110px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(145deg, var(--card2), rgba(247,197,0,0.05));
  border: 1px solid var(--border-strong);
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s;
}

.question-box.level-b1 {
  background: linear-gradient(145deg, var(--card2), rgba(30,80,255,0.06));
  border-color: rgba(74,125,255,0.35);
}

.question-box::after {
  content:'EN';
  position:absolute;
  right:-4px; bottom:-16px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:100px; font-weight:900;
  color:rgba(247,197,0,0.04);
  letter-spacing:-2px;
  line-height:1; pointer-events:none;
}

.question-label {
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:1.5px;
  color:var(--muted);
  margin-bottom:11px;
  font-weight:700;
}

.question-word {
  font-family:'Nunito',sans-serif;
  font-size: clamp(16px, 4vw, 22px);
  font-weight: 800;
  color: var(--text);
  line-height: 1.5;
  position:relative; z-index:1;
}

.question-hint {
  font-size:13px;
  color:var(--correct);
  margin-top:10px;
  font-weight:700;
  line-height:1.45;
}

/* ── Options ── */
.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}

.option-btn {
  background: var(--card2);
  border: 2px solid rgba(247,197,0,0.08);
  border-radius: 14px;
  padding: 13px 11px;
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s ease;
  text-align: left;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  line-height: 1.45;
  -webkit-tap-highlight-color: transparent;
}

.opt-letter {
  width: 28px; height: 28px;
  border-radius: 9px;
  background: rgba(247,197,0,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900;
  color: var(--muted);
  flex-shrink: 0;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0;
  transition: all 0.15s;
}

.opt-text { flex:1; }

.option-btn:hover:not(:disabled) {
  border-color: rgba(247,197,0,0.45);
  background: rgba(247,197,0,0.07);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}
.option-btn:active:not(:disabled) {
  transform: translateY(0px) scale(0.98);
}

.option-btn.correct {
  border-color: var(--correct);
  background: rgba(61,232,160,0.08);
}
.option-btn.correct .opt-letter {
  background: var(--correct);
  color: #050e1a;
}

.option-btn.wrong {
  border-color: var(--wrong);
  background: rgba(255,79,110,0.08);
}
.option-btn.wrong .opt-letter {
  background: var(--wrong);
  color: #050e1a;
}

.option-btn:disabled { cursor: default; transform:none !important; }

/* ── Bottom Buttons ── */
.bottom-row {
  display: flex; gap: 8px;
  margin-top: 12px;
}

.pass-btn {
  flex:1; padding:14px;
  background: transparent;
  border: 2px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  color: var(--muted);
  font-family: 'Nunito', sans-serif;
  font-size: 14px; font-weight: 800;
  cursor: pointer;
  transition: all 0.18s ease;
  display:flex; align-items:center; justify-content:center; gap:6px;
}
.pass-btn:hover {
  border-color:rgba(255,255,255,0.18);
  color:var(--text);
  background:rgba(255,255,255,0.04);
}

.toggle-btn {
  flex:1; padding:14px;
  background: linear-gradient(135deg, rgba(247,197,0,0.16), rgba(247,197,0,0.06));
  border: 2px solid rgba(247,197,0,0.35);
  border-radius: 14px;
  color: var(--yellow);
  font-family: 'Nunito', sans-serif;
  font-size: 14px; font-weight: 800;
  cursor: pointer;
  transition: all 0.18s ease;
  display:flex; align-items:center; justify-content:center; gap:6px;
}
.toggle-btn:hover {
  background: rgba(247,197,0,0.24);
  box-shadow: 0 0 20px rgba(247,197,0,0.15);
}

/* ── Feedback emoji ── */
.feedback {
  position: fixed;
  top:50%; left:50%;
  transform: translate(-50%,-50%) scale(0.5);
  font-size: 90px;
  opacity: 0;
  pointer-events: none;
  transition: all 0.22s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  z-index:100;
  filter: drop-shadow(0 0 30px rgba(247,197,0,0.4));
}
.feedback.show { transform: translate(-50%,-50%) scale(1); opacity:1; }
.feedback.hide { transform: translate(-50%,-50%) scale(1.4); opacity:0; transition:all 0.3s ease; }

/* ── Progress bar ── */
.progress-wrap {
  width:100%; max-width:560px;
  height:4px;
  background:rgba(255,255,255,0.05);
  border-radius:4px;
  margin-bottom:18px;
  position:relative; z-index:1;
  overflow:hidden;
}
.progress-bar {
  height:100%;
  background: linear-gradient(90deg, var(--yellow), #ffd84d);
  border-radius:4px;
  transition: width 0.4s ease;
  box-shadow: 0 0 8px rgba(247,197,0,0.5);
}

.no-data {
  text-align:center; color:var(--muted);
  font-size:14px; padding:20px 0;
}

/* ── Streak badge ── */
.streak-wrap {
  position:relative; z-index:1;
  margin-bottom:16px;
  height:28px;
  display:flex; align-items:center; justify-content:center;
}
.streak-badge {
  background: linear-gradient(135deg, rgba(247,197,0,0.2), rgba(247,197,0,0.08));
  border: 1px solid rgba(247,197,0,0.4);
  border-radius:20px;
  padding:4px 16px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px; font-weight:700;
  color:var(--yellow);
  letter-spacing:0.5px;
  display:flex; align-items:center; gap:6px;
  animation: popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes popIn {
  0% { transform:scale(0.6); opacity:0; }
  100% { transform:scale(1); opacity:1; }
}

@media (max-width: 400px) {
  .options { grid-template-columns: 1fr; }
  .card { padding: 20px 14px 18px; }
  .option-btn { font-size:13.5px; }
}

/* ── Tarih Alt Kategori Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  z-index: 999;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
}
.modal-overlay.open {
  opacity: 1; pointer-events: all;
}
.modal-box {
  background: var(--card);
  border: 1px solid rgba(40,210,120,0.3);
  border-radius: 26px;
  padding: 28px 24px;
  max-width: 400px; width: calc(100% - 32px);
  position: relative;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 40px rgba(40,210,120,0.08);
  transform: translateY(18px) scale(0.97);
  transition: transform 0.28s cubic-bezier(0.175,0.885,0.32,1.275);
}
.modal-overlay.open .modal-box {
  transform: translateY(0) scale(1);
}
.modal-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px; font-weight: 800;
  color: #5debb0;
  text-align: center;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}
.modal-sub {
  text-align: center;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-bottom: 22px;
  text-transform: uppercase;
}
.modal-cats {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.modal-cat-btn {
  display: flex; align-items: center; gap: 14px;
  background: rgba(20,180,100,0.07);
  border: 2px solid rgba(40,210,120,0.18);
  border-radius: 16px;
  padding: 15px 18px;
  cursor: pointer;
  transition: all 0.18s ease;
  text-align: left;
  width: 100%;
  -webkit-tap-highlight-color: transparent;
}
.modal-cat-btn:hover, .modal-cat-btn.selected {
  background: rgba(20,180,100,0.18);
  border-color: #28d478;
  box-shadow: 0 0 16px rgba(20,200,100,0.18);
}
.modal-cat-icon {
  font-size: 26px; flex-shrink: 0;
  width: 44px; height: 44px;
  background: rgba(20,180,100,0.12);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(40,210,120,0.25);
}
.modal-cat-info { flex: 1; }
.modal-cat-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px; font-weight: 800;
  color: #5debb0;
  letter-spacing: 0.3px;
  line-height: 1.2;
}
.modal-cat-desc {
  font-size: 12px; color: var(--muted);
  font-weight: 600; margin-top: 2px;
}
.modal-close {
  position: absolute; top: 16px; right: 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 50%;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--muted); font-size: 16px;
  transition: all 0.15s;
}
.modal-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }

/* Aktif alt kategori göstergesi */
.tarih-sub-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(20,180,100,0.1);
  border: 1px solid rgba(40,210,120,0.3);
  border-radius: 12px;
  padding: 3px 10px;
  font-size: 11px; font-weight: 700;
  color: #5debb0;
  margin-top: 5px;
  letter-spacing: 0.3px;
  cursor: pointer;
  transition: background 0.15s;
}
.tarih-sub-badge:hover { background: rgba(20,180,100,0.2); }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<!-- Header -->
<div class="header">
  <div class="logo-ring">
    <span class="logo-inner">FB</span>
  </div>
  <h1>İngilizce <span>Quiz</span></h1>
  <p>4 şıklı cümle testi • İki yönlü</p>
</div>

<!-- Level Selector -->
<div class="level-selector">
  <button class="level-btn a active" id="btnA" onclick="setLevel('a')">⭐ A Seviyesi</button>
  <button class="level-btn b1" id="btnB1" onclick="setLevel('b1')">🔥 B Seviyesi</button>
  <button class="level-btn fiil" id="btnFiil" onclick="setLevel('fiil')">⚡ Fiiller</button>
  <button class="level-btn tarih" id="btnTarih" onclick="tarihButonTiklandi()">📅 Tarihler</button>
  <button class="level-btn saat" id="btnSaat" onclick="setLevel('saat')">🕐 Saat</button>
  <button class="level-btn sayi" id="btnSayi" onclick="setLevel('sayi')">🔢 Sayılar</button>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat">
    <div class="stat-num" id="dogruSay">0</div>
    <div class="stat-label">Doğru</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="yanlisSay">0</div>
    <div class="stat-label">Yanlış</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="toplamSay">0</div>
    <div class="stat-label">Toplam</div>
  </div>
</div>

<!-- Progress bar -->
<div class="progress-wrap">
  <div class="progress-bar" id="progressBar" style="width:0%"></div>
</div>

<!-- Streak -->
<div class="streak-wrap" id="streakWrap"></div>

<!-- Main Card -->
<div class="card">
  <div class="badge-row">
    <div class="dir-badge">
      <div class="dot"></div>
      <span id="directionText">İngilizce → Türkçe</span>
    </div>
    <div class="lvl-badge a" id="levelBadge">A Seviyesi</div>
  </div>
  <div id="tarihSubRow" style="display:none; margin-bottom:12px;">
    <span class="tarih-sub-badge" onclick="acTarihModal()">
      <span id="tarihSubIcon">📆</span>
      <span id="tarihSubLabel">Tarih Okuma</span>
      <span style="opacity:0.5; font-size:10px; margin-left:2px;">▾</span>
    </span>
  </div>

  <div class="question-box" id="questionBox">
    <div class="question-label" id="questionLabel">Bu cümlenin Türkçesi nedir?</div>
    <div class="question-word" id="questionWord">Yükleniyor…</div>
    <div class="question-hint" id="questionHint"></div>
  </div>

  <div class="options" id="optionsContainer"></div>

  <div class="bottom-row">
    <button class="pass-btn" onclick="pas()">⏭ Geç</button>
    <button class="toggle-btn" onclick="toggleDirection()">🔄 Yön Değiştir</button>
  </div>
</div>

<!-- Tarih Alt Kategori Modal -->
<div class="modal-overlay" id="tarihModal">
  <div class="modal-box">
    <button class="modal-close" onclick="kapatTarihModal()">✕</button>
    <div class="modal-title">📅 Tarih Kategorileri</div>
    <div class="modal-sub">Çalışmak istediğin konuyu seç</div>
    <div class="modal-cats">
      <button class="modal-cat-btn" id="catTarihOkuma" onclick="secTarihKat('tarihOkuma')">
        <div class="modal-cat-icon">📆</div>
        <div class="modal-cat-info">
          <div class="modal-cat-name">Tarih Okuma</div>
          <div class="modal-cat-desc">12.04.2025 → the twelfth of April… formatı</div>
        </div>
      </button>
      <button class="modal-cat-btn" id="catAylar" onclick="secTarihKat('aylar')">
        <div class="modal-cat-icon">🗓️</div>
        <div class="modal-cat-info">
          <div class="modal-cat-name">Aylar</div>
          <div class="modal-cat-desc">January, February… ↔ Ocak, Şubat…</div>
        </div>
      </button>
      <button class="modal-cat-btn" id="catGunler" onclick="secTarihKat('gunler')">
        <div class="modal-cat-icon">📅</div>
        <div class="modal-cat-info">
          <div class="modal-cat-name">Günler</div>
          <div class="modal-cat-desc">Monday, Tuesday… ↔ Pazartesi, Salı…</div>
        </div>
      </button>
      <button class="modal-cat-btn" id="catMevsimler" onclick="secTarihKat('mevsimler')">
        <div class="modal-cat-icon">🌸</div>
        <div class="modal-cat-info">
          <div class="modal-cat-name">Mevsimler</div>
          <div class="modal-cat-desc">Spring, Summer, Autumn, Winter + cümleler</div>
        </div>
      </button>
    </div>
  </div>
</div>

<div class="feedback" id="feedbackEmoji"></div>

<script src="aingilizce.js"></script>
<script src="bingilizce.js"></script>
<script src="fiiller.js"></script>
<script src="tarih.js"></script>
<script src="saat.js"></script>
<script src="ingsayilar.js"></script>

<script>
let direction = 'en_to_tr';
let activeLevel = 'a';
let aktifCumle = null;
let dogru = 0, yanlis = 0, toplam = 0;
let streak = 0;
let answered = false;

const QUIZ_LEVELS = {
  a:     { label: 'A Seviyesi',   badge: 'a',    dir: true  },
  b1:    { label: 'B Seviyesi',   badge: 'b1',   dir: true  },
  fiil:  { label: '⚡ Fiil Çekimi', badge: 'fiil', dir: false },
  tarih: { label: '📅 Tarihler',   badge: 'tarih',dir: false },
  saat:  { label: '🕐 Saat',       badge: 'saat', dir: false },
  sayi:  { label: '🔢 Sayılar',    badge: 'sayi', dir: false },
};

const TARIH_KATS = {
  tarihOkuma: { label: 'Tarih Okuma', icon: '📆' },
  aylar:      { label: 'Aylar',       icon: '🗓️' },
  gunler:     { label: 'Günler',      icon: '📅' },
  mevsimler:  { label: 'Mevsimler',   icon: '🌸' },
};

function getPool() {
  if (activeLevel === 'a')     return typeof AseviyeCumleler  !== 'undefined' ? AseviyeCumleler  : [];
  if (activeLevel === 'b1')    return typeof BseviyeCumleler  !== 'undefined' ? BseviyeCumleler  : [];
  if (activeLevel === 'fiil')  return typeof FiilCekimleri    !== 'undefined' ? FiilCekimleri    : [];
  if (activeLevel === 'tarih') return typeof getTarihPool     !== 'undefined' ? getTarihPool(aktivTarihKategori) : (typeof TarihSorulari !== 'undefined' ? TarihSorulari : []);
  if (activeLevel === 'saat')  return typeof SaatSorulari     !== 'undefined' ? SaatSorulari     : [];
  if (activeLevel === 'sayi')  return typeof SayiSorulari     !== 'undefined' ? SayiSorulari     : [];
  return [];
}

// ── Tarih Modal ──
function tarihButonTiklandi() {
  if (activeLevel !== 'tarih') {
    // İlk tıklamada: hem seviyeyi set et hem modalı aç
    setLevel('tarih', true);
  }
  acTarihModal();
}

function acTarihModal() {
  // Aktif kategori butonunu vurgula
  document.querySelectorAll('.modal-cat-btn').forEach(b => b.classList.remove('selected'));
  const aktifBtn = document.getElementById('cat' + aktivTarihKategori.charAt(0).toUpperCase() + aktivTarihKategori.slice(1));
  if (aktifBtn) aktifBtn.classList.add('selected');
  document.getElementById('tarihModal').classList.add('open');
}

function kapatTarihModal() {
  document.getElementById('tarihModal').classList.remove('open');
}

function secTarihKat(kat) {
  aktivTarihKategori = kat;
  const cfg = TARIH_KATS[kat];
  document.getElementById('tarihSubIcon').textContent = cfg.icon;
  document.getElementById('tarihSubLabel').textContent = cfg.label;
  kapatTarihModal();
  yeniSoru();
}

// Modal dışına tıklayınca kapat
document.getElementById('tarihModal').addEventListener('click', function(e) {
  if (e.target === this) kapatTarihModal();
});

function setLevel(lvl, skipModal = false) {
  activeLevel = lvl;
  const allBtns = ['a','b1','fiil','tarih','saat','sayi'];
  allBtns.forEach(k => {
    const el = document.getElementById('btn' + k.charAt(0).toUpperCase() + k.slice(1));
    if (el) el.classList.toggle('active', k === lvl);
  });

  const cfg = QUIZ_LEVELS[lvl];
  const badge = document.getElementById('levelBadge');
  badge.className = 'lvl-badge ' + cfg.badge;
  badge.textContent = cfg.label;

  const qbox = document.getElementById('questionBox');
  ['a','b1','fiil','tarih','saat','sayi'].forEach(k => qbox.classList.remove('level-' + k));
  if (lvl !== 'a' && lvl !== 'b1') qbox.classList.add('level-' + lvl);
  if (lvl === 'b1') qbox.classList.add('level-b1');

  document.querySelector('.toggle-btn').style.display = cfg.dir ? '' : 'none';

  // Tarih alt kategori badge satırını göster/gizle
  document.getElementById('tarihSubRow').style.display = lvl === 'tarih' ? '' : 'none';

  if (!skipModal) yeniSoru();
}

function getRandom(arr, count, exclude) {
  const pool = arr.filter(k => k !== exclude);
  const result = [], used = new Set();
  while (result.length < count && result.length < pool.length) {
    const i = Math.floor(Math.random() * pool.length);
    if (!used.has(i)) { used.add(i); result.push(pool[i]); }
  }
  return result;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function updateProgress() {
  const pct = toplam === 0 ? 0 : Math.round((dogru / toplam) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
}

function updateStreak() {
  const wrap = document.getElementById('streakWrap');
  if (streak >= 3) {
    wrap.innerHTML = `<div class="streak-badge">🔥 ${streak} doğru üst üste!</div>`;
  } else {
    wrap.innerHTML = '';
  }
}

function yeniSoru() {
  answered = false;
  const pool = getPool();
  const container = document.getElementById('optionsContainer');
  document.getElementById('questionHint').textContent = '';

  if (!pool || pool.length < 4) {
    document.getElementById('questionWord').textContent = '—';
    document.getElementById('questionLabel').textContent = 'Soru bulunamadı';
    container.innerHTML = '<div class="no-data">JS dosyası eksik ya da boş.</div>';
    return;
  }

  // ── Soru bazlı mod (fiil, tarih, saat, sayı) ──
  const soruModu = ['fiil','tarih','saat','sayi'].includes(activeLevel);
  if (soruModu) {
    aktifCumle = pool[Math.floor(Math.random() * pool.length)];
    const cfg = QUIZ_LEVELS[activeLevel];
    document.getElementById('directionText').textContent = cfg.label;
    document.getElementById('questionLabel').textContent = 'Doğru cevabı seçin';
    document.getElementById('questionWord').textContent = aktifCumle.soru;

    // 3 yanlış + 1 doğru
    const secenekler = shuffle([aktifCumle.dogru, ...aktifCumle.yanlis]);
    const letters = ['A','B','C','D'];
    container.innerHTML = '';

    secenekler.forEach((val, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      const s1 = document.createElement('span');
      s1.className = 'opt-letter'; s1.textContent = letters[i];
      const s2 = document.createElement('span');
      s2.className = 'opt-text'; s2.textContent = val;
      btn.appendChild(s1); btn.appendChild(s2);
      btn.onclick = () => secimFiil(btn, val === aktifCumle.dogru);
      container.appendChild(btn);
    });
    return;
  }

  // ── Cümle modu (A / B seviyesi) ──
  aktifCumle = pool[Math.floor(Math.random() * pool.length)];

  const isEnToTr = direction === 'en_to_tr';
  document.getElementById('directionText').textContent = isEnToTr ? 'İngilizce → Türkçe' : 'Türkçe → İngilizce';
  document.getElementById('questionLabel').textContent = isEnToTr ? 'Bu cümlenin Türkçesi nedir?' : 'Bu cümlenin İngilizcesi nedir?';
  document.getElementById('questionWord').textContent = isEnToTr ? aktifCumle.eng : aktifCumle.tr;

  const yanlislar = getRandom(pool, 3, aktifCumle);
  const secenekler = shuffle([aktifCumle, ...yanlislar]);
  const letters = ['A','B','C','D'];
  container.innerHTML = '';

  secenekler.forEach((k, i) => {
    const text = isEnToTr ? k.tr : k.eng;
    const btn = document.createElement('button');
    btn.className = 'option-btn';

    const s1 = document.createElement('span');
    s1.className = 'opt-letter'; s1.textContent = letters[i];

    const s2 = document.createElement('span');
    s2.className = 'opt-text'; s2.textContent = text;

    btn.appendChild(s1); btn.appendChild(s2);
    btn.onclick = () => secim(btn, k === aktifCumle, isEnToTr);
    container.appendChild(btn);
  });
}

function secimFiil(btn, isCorrect) {
  if (answered) return;
  answered = true;
  toplam++;
  document.getElementById('toplamSay').textContent = toplam;
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

  if (isCorrect) {
    dogru++; streak++;
    document.getElementById('dogruSay').textContent = dogru;
    btn.classList.add('correct');
    showFeedback('✅');
  } else {
    yanlis++; streak = 0;
    document.getElementById('yanlisSay').textContent = yanlis;
    btn.classList.add('wrong');
    showFeedback('❌');
    document.querySelectorAll('.option-btn').forEach(b => {
      if (b.querySelector('.opt-text').textContent === aktifCumle.dogru) b.classList.add('correct');
    });
    document.getElementById('questionHint').textContent = '✦ ' + aktifCumle.ipucu;
  }

  updateProgress();
  updateStreak();
  setTimeout(yeniSoru, 900);
}

function secim(btn, isCorrect, isEnToTr) {
  if (answered) return;
  answered = true;
  toplam++;
  document.getElementById('toplamSay').textContent = toplam;

  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

  if (isCorrect) {
    dogru++; streak++;
    document.getElementById('dogruSay').textContent = dogru;
    btn.classList.add('correct');
    showFeedback('✅');
  } else {
    yanlis++; streak = 0;
    document.getElementById('yanlisSay').textContent = yanlis;
    btn.classList.add('wrong');
    showFeedback('❌');
    const dogruTxt = isEnToTr ? aktifCumle.tr : aktifCumle.eng;
    document.querySelectorAll('.option-btn').forEach(b => {
      if (b.querySelector('.opt-text').textContent === dogruTxt) b.classList.add('correct');
    });
    document.getElementById('questionHint').textContent = '✦ ' + dogruTxt;
  }

  updateProgress();
  updateStreak();
  setTimeout(yeniSoru, 900);
}

function showFeedback(emoji) {
  const el = document.getElementById('feedbackEmoji');
  el.textContent = emoji;
  el.className = 'feedback show';
  setTimeout(() => {
    el.className = 'feedback hide';
    setTimeout(() => el.className = 'feedback', 200);
  }, 450);
}

function pas() { if (!answered) yeniSoru(); }

function toggleDirection() {
  direction = direction === 'en_to_tr' ? 'tr_to_en' : 'en_to_tr';
  yeniSoru();
}

yeniSoru();
</script>
</body>
</html>
