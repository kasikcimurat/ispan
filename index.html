<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ana Sayfa</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --accent: #ff3c5f;
    --accent2: #ff8c42;
    --blue: #4a7dff;
    --blue2: #7aaeff;
    --text: #f0eee8;
    --muted: #666;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    padding: 2rem 1rem 5rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(255,60,95,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 70%, rgba(74,125,255,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    width: 100%;
    max-width: 760px;
  }

  .logo {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(3.5rem, 10vw, 7rem);
    letter-spacing: 0.06em;
    line-height: 1;
    background: linear-gradient(135deg, #ff3c5f 0%, #ff8c42 60%, #4a7dff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }

  .tagline {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 2.8rem;
  }

  .lang-section {
    margin-bottom: 2.2rem;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 0.9rem;
    padding: 0 4px;
  }

  .section-label {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.5rem;
    letter-spacing: 0.1em;
  }

  .section-label.es { color: #ff3c5f; }
  .section-label.en { color: #4a7dff; }

  .section-line {
    flex: 1;
    height: 1px;
  }

  .section-line.es { background: linear-gradient(90deg, rgba(255,60,95,0.5), transparent); }
  .section-line.en { background: linear-gradient(90deg, rgba(74,125,255,0.5), transparent); }

  .nav-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 0.9rem;
  }

  .nav-btn {
    display: block;
    padding: 1rem 1.2rem;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.07);
    color: var(--text);
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
  }

  .nav-btn:hover {
    transform: translateY(-3px);
  }

</style>
</head>

<body>

<div class="container">
  <div class="logo">Dil Quiz</div>
  <p class="tagline">kelimeler • cümleler • sayılar</p>

  <!-- İspanyolca -->
  <div class="lang-section">
    <div class="section-header">
      <span class="section-label es">🇪🇸 İspanyolca</span>
      <div class="section-line es"></div>
    </div>

    <div class="nav-grid">
      <a href="ispanyolca.html" class="nav-btn">İspanyolca</a>
    </div>
  </div>

  <!-- İngilizce -->
  <div class="lang-section">
    <div class="section-header">
      <span class="section-label en">🇬🇧 İngilizce</span>
      <div class="section-line en"></div>
    </div>

    <div class="nav-grid">
      <a href="ingilizce.html" class="nav-btn">İngilizce</a>
    </div>
  </div>

</div>

<script>
window.onload = function () {
  let isim = prompt("Adını gir:");

  if (!isim) return;

  fetch("log.php", {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: "isim=" + encodeURIComponent(isim)
  });
};
</script>

</body>
</html>
