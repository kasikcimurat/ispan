<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ana Sayfa</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --accent: #ff3c5f;
    --accent2: #ff8c42;
    --text: #f0eee8;
    --muted: #666;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(255,60,95,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 70%, rgba(255,140,66,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Noise texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
  }

  .logo {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(4rem, 12vw, 8rem);
    letter-spacing: 0.06em;
    line-height: 1;
    background: linear-gradient(135deg, #ff3c5f 0%, #ff8c42 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeDown 0.8s ease both;
    margin-bottom: 0.3rem;
  }

  .tagline {
    font-size: 0.95rem;
    color: var(--muted);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 3rem;
    animation: fadeDown 0.8s 0.15s ease both;
  }

  .nav-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    max-width: 700px;
    margin: 0 auto 3rem;
    animation: fadeUp 0.8s 0.3s ease both;
  }

  .nav-btn {
    display: block;
    padding: 1.1rem 1.5rem;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.07);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    letter-spacing: 0.05em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
  }

  .nav-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,60,95,0.15), rgba(255,140,66,0.1));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .nav-btn::after {
    content: attr(data-label);
    position: absolute;
    bottom: 6px;
    right: 10px;
    font-size: 0.6rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.6;
  }

  .nav-btn:hover {
    border-color: rgba(255,60,95,0.5);
    transform: translateY(-3px);
  }

  .nav-btn:hover::before { opacity: 1; }

  .nav-btn .icon {
    display: block;
    font-size: 1.6rem;
    margin-bottom: 0.4rem;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    margin: 0 auto 2rem;
    animation: fadeUp 0.8s 0.45s ease both;
  }

  footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 1;
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    background: linear-gradient(to top, rgba(10,10,15,0.95), transparent);
    animation: fadeUp 0.8s 0.6s ease both;
  }

  .tiktok-link {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    transition: color 0.3s;
  }

  .tiktok-link:hover { color: var(--text); }

  .tiktok-icon {
    width: 18px;
    height: 18px;
    fill: currentColor;
  }

  .tiktok-handle {
    color: var(--accent);
    font-weight: 600;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Floating particles */
  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    animation: float linear infinite;
    opacity: 0.15;
    z-index: 0;
  }

  @keyframes float {
    from { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.15; }
    90% { opacity: 0.15; }
    to   { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<!-- Particles -->
<script>
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 6 + 2;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      background:${Math.random()>0.5?'#ff3c5f':'#ff8c42'};
      animation-duration:${8+Math.random()*12}s;
      animation-delay:${-Math.random()*15}s;
    `;
    document.body.appendChild(p);
  }
</script>
